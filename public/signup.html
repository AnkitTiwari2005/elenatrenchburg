<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Admin Account — E. Trenchburg Writes</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border: 1px solid rgba(26,22,20,0.12);
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(26,22,20,0.08);
    }
    h1 {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #1a1614;
    }
    p {
      font-size: 0.88rem;
      color: #6b6560;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    button {
      display: inline-block;
      padding: 14px 32px;
      background: #1a1614;
      color: #faf8f5;
      border: none;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
      margin-bottom: 12px;
    }
    button:hover { background: #6b6560; }
    button.outline {
      background: transparent;
      color: #1a1614;
      border: 1.5px solid #1a1614;
    }
    button.outline:hover { background: #1a1614; color: #faf8f5; }
    .wordmark {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #1a1614;
      margin-bottom: 24px;
      display: block;
    }
    .note {
      font-size: 0.75rem;
      color: #9c9390;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="wordmark">E. Trenchburg Writes</span>
    <h1>Create Admin Account</h1>
    <p>Use the button below to create your admin account. After signing up, check your email to confirm, then log in at <strong>/admin</strong>.</p>

    <button id="signup-btn">Sign Up / Create Account</button>
    <button class="outline" id="login-btn">Already have account? Log In</button>
    <button class="outline" id="recover-btn">Forgot Password?</button>

    <p class="note">After creating your account, delete this page from Netlify or set registration back to "Invite Only".</p>
  </div>

  <script>
    const widget = window.netlifyIdentity;

    document.getElementById('signup-btn').addEventListener('click', function() {
      widget.open('signup');
    });

    document.getElementById('login-btn').addEventListener('click', function() {
      widget.open('login');
    });

    document.getElementById('recover-btn').addEventListener('click', function() {
      widget.open('recovery');
    });

    widget.on('login', function(user) {
      console.log('Logged in:', user);
      window.location.href = '/admin/';
    });

    widget.on('signup', function(user) {
      console.log('Signed up:', user);
      alert('Account created! Check your email to confirm, then log in at /admin/');
    });
  </script>
</body>
</html>
